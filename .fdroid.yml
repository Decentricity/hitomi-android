Description: |-
  Open Hitomi is a floating Android hedgehog assistant built around a local overlay UI.

  The current open flavor includes:
  - on-device API key entry
  - floating assistant overlay
  - browser tools
  - optional Termux bridge support
  - local Solana wallet display tools

  Open Hitomi is intended to stay open, configurable, and ready for additional compatible local or remote model endpoints over time.
